<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
    <title>Saucebook</title>
</head>

<body>
    <header class="fve-header">
        <h1>Saucebook<span id="draft-count" class="badge">0</span></h1>
        <span class="fve-subtitle">Vote enhancer</span>
        <span class="fve-version">v1.0</span>
    </header>
    <!-- stato auth google -->
    <section class="fve-auth">
        <div id="auth-status">Loading...</div>
        <button id="btn-auth" aria-label="Link Google account">Link google</button>
        <button id="btn-logout" hidden aria-label="Disconnect Google account">Disconnect</button>
    </section>

    <!-- bozze salvate -->
    <section class="fve-drafts">
        <h2>Drafts saved</h2>
        <div id="drafts-list" hidden>No drafts</div>
    </section>

    <!-- stats badge -->
    <section class="fve-stats-badge">
        <div class="stat-badge">
            <span class="stat-label">Avg Score</span>
            <span class="stat-value" id="popup-avg-score">-</span>
        </div>
    </section>


    <!-- link rapidi -->
    <footer class="fve-footer">
        <a id="link-drive" href="#" target="_blank" aria-label="Open Google Drive">Open Drive</a>
        <a id="link-notebook" href="#" target="_blank" aria-label="Open NotebookLM">NotebookLM</a>
        <a href="../options/options.html" target="_blank" aria-label="Open extension settings">Settings</a>
    </footer>

    <script src="popup.js"></script>
</body>

</html>
